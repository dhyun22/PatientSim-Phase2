data_dir: ./data/final_data
prompt_dir: ./prompts/simulation
save_dir: outputs

experiment:
  exp_name: ""
  random_seed: 42
  total_inferences: 4
  verbose: true

data:
  data_file_name: patient_profile_phase2
  num_scenarios: null
  num_word_sample: 10
  patient_prompt_file: initial_system_patient_w_persona
  doctor_prompt_file: initial_system_doctor
  scenario_id: null


patient_agent:
  api_type: genai
  backend: gemini-flash-lite-latest
  params:
    temperature: 0.7
    seed: ${experiment.random_seed}
  persona:
    cefr_type: null
    personality_type: null
    recall_level_option: null
    dazed_level_option: null


doctor_agent:
  api_type: genai
  backend: gemini-flash-lite-latest
  max_infs: 4
  top_k_diagnosis: 5
  strategy: passive_dots          # passive_dots | passive_hmm | passive_isee | passive_oh | freestyle | sample
  params:
    temperature: 1.0
    seed: ${experiment.random_seed}

hydra:
  job_logging:
    root:
      level: INFO
  run:
    dir: results/${now:%Y-%m-%d-%H-%M-%S}_${experiment.exp_name}
